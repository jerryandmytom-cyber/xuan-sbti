# ===========================================================
# Render Web Service - 八字算命Bot
# ===========================================================
# 用于八字算命、姻缘测算、紫微斗数等玄学服务

services:
  - type: web
    name: xuanvip-bot
    env: python
    region: singapore
    plan: free
    
    buildCommand: pip install -r requirements.txt
    startCommand: python new/bot_startup.py
    healthCheckPath: /health
    
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PORT
        value: "8443"
      - key: RENDER
        value: "true"