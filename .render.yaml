# Render Blueprint for SBTI Mini App
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sbti-miniapp
    runtime: node
    region: singapore
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
